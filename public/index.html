<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇 · 登录</title>
  <meta name="description" content="贪吃蛇网页游戏 — 登录或注册以保存游戏记录并挑战排行榜。" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Page Layout ── */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    .logo-icon {
      font-size: 36px;
      filter: drop-shadow(0 0 10px rgba(167,139,250,0.6));
      animation: pulse-icon 3s ease-in-out infinite;
    }

    @keyframes pulse-icon {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(167,139,250,0.6)); }
      50%       { filter: drop-shadow(0 0 20px rgba(96,165,250,0.8)); }
    }

    .logo-text {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .logo-sub {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: -24px;
      margin-bottom: 28px;
      letter-spacing: 0.06em;
    }

    /* ── Tab Switch ── */
    .auth-card {
      padding: 32px 28px;
    }

    .tab-nav {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .tab-btn.active {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    /* ── Forms ── */
    .tab-panel {
      display: none;
      flex-direction: column;
      gap: 14px;
      animation: fade-in 0.25s ease;
    }

    .tab-panel.active { display: flex; }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      margin-top: 6px;
      border-radius: var(--radius-sm);
    }

    /* ── Guest Section ── */
    .guest-section {
      margin-top: 20px;
    }

    .guest-btn {
      width: 100%;
      padding: 11px;
      font-size: 13px;
      gap: 8px;
    }

    .guest-hint {
      margin-top: 8px;
      font-size: 12px;
      text-align: center;
      color: var(--text-faint);
    }

    /* ── Error msg ── */
    #login-msg, #register-msg { margin-top: 2px; }
  </style>
</head>
<body>
  <!-- Background Orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="page-wrapper">
    <!-- Logo -->
    <div class="logo">
      <span class="logo-icon">🐍</span>
      <span class="logo-text grad-text">贪吃蛇</span>
    </div>
    <p class="logo-sub">SNAKE GAME · 高分挑战</p>

    <!-- Auth Card -->
    <div class="glass auth-card">
      <!-- Tab Nav -->
      <div class="tab-nav" role="tablist">
        <button class="tab-btn active" role="tab" id="tab-login-btn"
                aria-selected="true" aria-controls="panel-login"
                onclick="switchTab('login')">登录</button>
        <button class="tab-btn" role="tab" id="tab-register-btn"
                aria-selected="false" aria-controls="panel-register"
                onclick="switchTab('register')">注册</button>
      </div>

      <!-- Login Panel -->
      <div class="tab-panel active" id="panel-login" role="tabpanel">
        <div class="form-group">
          <label class="form-label" for="login-username">用户名</label>
          <input class="form-input" type="text" id="login-username"
                 placeholder="输入用户名" autocomplete="username" />
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">密码</label>
          <input class="form-input" type="password" id="login-password"
                 placeholder="输入密码" autocomplete="current-password" />
        </div>
        <div class="msg msg-error" id="login-msg" role="alert"></div>
        <button class="btn btn-primary submit-btn" id="login-btn"
                onclick="handleLogin()">
          登入游戏
        </button>
      </div>

      <!-- Register Panel -->
      <div class="tab-panel" id="panel-register" role="tabpanel">
        <div class="form-group">
          <label class="form-label" for="reg-username">用户名</label>
          <input class="form-input" type="text" id="reg-username"
                 placeholder="2–20 个字符" autocomplete="username" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">密码</label>
          <input class="form-input" type="password" id="reg-password"
                 placeholder="至少 6 位" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-confirm">确认密码</label>
          <input class="form-input" type="password" id="reg-confirm"
                 placeholder="再次输入密码" autocomplete="new-password" />
        </div>
        <div class="msg msg-error" id="register-msg" role="alert"></div>
        <button class="btn btn-primary submit-btn" id="register-btn"
                onclick="handleRegister()">
          创建账号
        </button>
      </div>

      <!-- Guest Divider -->
      <div class="guest-section">
        <div class="divider">或</div>
        <button class="btn btn-secondary guest-btn mt-12"
                id="guest-btn" onclick="handleGuest()">
          👤 以游客身份游玩
        </button>
        <p class="guest-hint">游客记录不会永久保存，但仍可出现在排行榜</p>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
